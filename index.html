<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"><style>:root{--bg:#fff;--text:#111;--line:#111}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}a{text-decoration:none;color:inherit}.screen{min-height:100dvh;background:#fff}.home{display:grid;grid-template-rows:repeat(4,minmax(0,1fr));height:100dvh;min-height:100dvh}.menu-link{display:flex;align-items:center;justify-content:flex-start;padding:16px 20px;border-bottom:1px solid var(--line);font-size:clamp(5.4rem,16vw,8rem);letter-spacing:-0.085em;line-height:0.82;font-weight:500;background:#fff;transition:background .18s ease,color .18s ease;min-height:0}.menu-link:first-child{border-top:1px solid var(--line)}.menu-link:hover,.menu-link:focus-visible{background:#111;color:#fff;outline:none}@media (max-width:720px){.menu-link{padding:8px 12px;font-size:clamp(5.6rem,21vw,7.6rem);letter-spacing:-0.1em;line-height:0.78}}@media (min-width:900px){.menu-link{padding:18px 28px;font-size:clamp(6rem,9.5vw,8.4rem);letter-spacing:-0.09em;line-height:0.8}}</style></head><body><main class="screen home" aria-label="Menú principal"><a href="desayuno.html" class="menu-link">Desayuno</a><a href="comida.html" class="menu-link">Comida</a><a href="snacks.html" class="menu-link">Snacks</a><a href="cena.html" class="menu-link">Cena</a></main></body></html>
