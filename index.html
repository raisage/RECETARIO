<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recetario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ffffff;
      --text:#111111;
      --line:#111111;
      --muted:#5b5b5b;
      --radius:18px;
      --space-1:4px;
      --space-2:8px;
      --space-3:12px;
      --space-4:16px;
      --space-5:20px;
      --space-6:24px;
      --space-8:32px;
      --space-10:40px;
      --space-12:48px;
      --text-xs:12px;
      --text-sm:14px;
      --text-base:16px;
      --text-lg:20px;
      --text-xl:28px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Inter', sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    a{text-decoration:none;color:inherit}
    .screen{min-height:100dvh;background:#fff}
    .home{
      display:grid;
      grid-template-rows:repeat(4,minmax(0,1fr));
      height:100dvh;
      min-height:100dvh;
    }
    .menu-link{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding:24px 20px;
      border-bottom:1px solid var(--line);
      font-size:clamp(4.6rem, 15vw, 6.8rem);
      letter-spacing:-0.075em;
      line-height:0.84;
      font-weight:500;
      background:#fff;
      transition:background .18s ease,color .18s ease;
      min-height:0;
    }
    .menu-link:first-child{border-top:1px solid var(--line)}
    .menu-link:hover,.menu-link:focus-visible{background:#111;color:#fff;outline:none}
    @media (min-width: 900px){
      .menu-link{padding:28px 28px;font-size:clamp(5.2rem, 9vw, 7.4rem);letter-spacing:-0.08em;line-height:0.82}
    }
  </style>
</head>
<body>
  <main class="screen home" aria-label="Menú principal">
    <a href="desayuno.html" class="menu-link">Desayuno</a>
    <a href="comida.html" class="menu-link">Comida</a>
    <a href="snacks.html" class="menu-link">Snacks</a>
    <a href="cena.html" class="menu-link">Cena</a>
  </main>
</body>
</html>
