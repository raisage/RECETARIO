<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Desayuno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--text:#111;--line:#111;--muted:#5b5b5b;--radius:18px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{text-decoration:none;color:inherit}
.section-view{min-height:100dvh;padding:28px 20px}
.section-shell{max-width:1200px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-top:8px;margin-bottom:24px;border-top:1px solid var(--line)}
.back{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-family:'Space Mono',monospace;font-size:14px}
.section-title{font-size:28px;letter-spacing:-0.05em;font-weight:500}
.filters{display:grid;gap:16px;margin-bottom:32px}
.group-pills{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.group-toggle{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-size:15px;font-weight:500;cursor:pointer;width:fit-content}
.group-toggle.active{background:#111;color:#fff}
.filter-group{border-top:1px solid var(--line);padding-top:12px;display:none}
.filter-group.open{display:block}
.filter-label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--line);border-radius:999px;background:#fff;padding:10px 14px;font-size:15px;font-weight:500;cursor:pointer}
.chip.active,.chip:hover{background:#111;color:#fff}
.cards{display:grid;gap:32px}
.card{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff}
.card-image-wrap{padding:16px 16px 0}
.card-image{aspect-ratio:4/3;border-radius:12px;background:linear-gradient(135deg,#efefef,#dcdcdc);display:flex;align-items:center;justify-content:center;color:#666;font-size:16px;font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.card-separator-space{height:16px;background:#fff}
.card-separator{height:1px;background:var(--line)}
.card-body{padding:16px}
.card-title{font-size:22px;letter-spacing:-0.045em;margin-bottom:12px;font-weight:500}
.card-intro{font-size:16px;line-height:1.6;color:var(--text);margin-bottom:16px;max-width:54ch}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.meta-block{display:grid;gap:8px}
.meta-label{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.meta-content{font-size:16px;line-height:1.5}
.meta-content.tech{font-family:'Space Mono',monospace}
.muted{color:var(--muted);font-family:'Inter',sans-serif}
@media (max-width:720px){.section-view{padding:20px 12px}.card-grid{grid-template-columns:1fr}}
@media (min-width:900px){.cards{grid-template-columns:repeat(2,minmax(0,1fr));gap:32px}}
</style>
</head>
<body>
<section class="section-view" aria-label="Sección de recetas">
<div class="section-shell">
<div class="topbar"><a class="back" href="index.html">Volver</a><h1 class="section-title">Desayuno</h1></div>
<div class="filters">
<div class="group-pills"><button class="group-toggle" type="button" data-target="nutrition">Nutrición</button><button class="group-toggle" type="button" data-target="flavors">Sabores</button><button class="group-toggle" type="button" data-target="technique">Técnica</button></div>
<div class="filter-group" data-group="nutrition"><div class="filter-label">Nutrición</div><div class="chips"><button class="chip" type="button">Proteína alta</button><button class="chip" type="button">Rico en hidratos</button><button class="chip" type="button">Fibra</button><button class="chip" type="button">Vitamina C</button><button class="chip" type="button">Antioxidante</button><button class="chip" type="button">Grasas saludables</button></div></div>
<div class="filter-group" data-group="flavors"><div class="filter-label">Sabores</div><div class="chips"><button class="chip" type="button">Mediterráneo</button><button class="chip" type="button">Asia</button><button class="chip" type="button">Italiana</button><button class="chip" type="button">Cítrico</button><button class="chip" type="button">Dulce</button><button class="chip" type="button">Salado</button><button class="chip" type="button">Picante</button><button class="chip" type="button">Umami</button></div></div>
<div class="filter-group" data-group="technique"><div class="filter-label">Técnica</div><div class="chips"><button class="chip" type="button">Rápido</button><button class="chip" type="button">Fresco</button><button class="chip" type="button">Horno</button><button class="chip" type="button">Cuchara</button><button class="chip" type="button">Plancha</button><button class="chip" type="button">Líquidos</button></div></div>
</div>
<div class="cards">
<article class="card" data-tags="mediterráneo,dulce,rápido,proteína alta"><div class="card-image-wrap"><div class="card-image">Avena de desayuno</div></div><div class="card-separator-space"></div><div class="card-separator"></div><div class="card-body"><h2 class="card-title">Avena con yogur y fruta</h2><p class="card-intro">Desayuno sencillo, cremoso y rápido.</p><div class="card-grid"><div class="meta-block"><div class="meta-label">Ingredientes</div><div class="meta-content tech">3 huevos, 1 yogur, 40 g avena, fruta de temporada</div></div><div class="meta-block"><div class="meta-label">Macros y detalles</div><div class="meta-content tech">430 kcal · 22P · 35C · 18G<br><span class="muted">Mediterráneo · dulce · rápido</span></div></div></div></div></article>
</div>
</div>
</section>
<script>
const toggles=[...document.querySelectorAll('.group-toggle')];
const panels=[...document.querySelectorAll('.filter-group')];
const chips=[...document.querySelectorAll('.chip')];
const cards=[...document.querySelectorAll('.card')];
const getActiveTags=()=>chips.filter(c=>c.classList.contains('active')).map(c=>c.textContent.trim().toLowerCase());
const applyFilters=()=>{const active=getActiveTags();cards.forEach(card=>{const tags=(card.dataset.tags||'').split(',').map(s=>s.trim().toLowerCase());const visible=active.length===0||active.every(tag=>tags.includes(tag));card.style.display=visible?'':'none';});};
toggles.forEach(btn=>btn.addEventListener('click',()=>{const panel=document.querySelector(`[data-group="${btn.dataset.target}"]`);const open=!panel.classList.contains('open');panels.forEach(p=>p.classList.remove('open'));toggles.forEach(b=>b.classList.remove('active'));if(open){panel.classList.add('open');btn.classList.add('active');}}));
chips.forEach(chip=>chip.addEventListener('click',e=>{e.stopPropagation();chip.classList.toggle('active');applyFilters();}));
applyFilters();
</script>
</body>
</html>
